<!doctype html>
<html lang="en">

<head>
    <meta charset="utf-8" />
    <title>Users</title>
    <link rel="stylesheet" href="/styles/main.css" />
    <script type="module" src="/scripts/users/index.js" defer></script>
</head>

<body>
    <header>
        <h1>Users</h1>
        <nav>
            <ul>
                <li><a href="/" class="btn">Home</a></li>
                <li><a href="/users/add.html" class="btn primary">Add User</a></li>
            </ul>
        </nav>
    </header>

    <main class="container">
        <div id="status"></div>
        <div id="user-list" class="grid cards"></div>
    </main>

    <template id="user-card">
        <div class="card">
            <h3 class="name"></h3>
            <p class="meta email"></p>

            <div class="row-actions">
                <a class="btn btn-view">View</a>
                <a class="btn btn-edit">Edit</a>
                <button class="btn danger btn-delete">Delete</button>
            </div>
        </div>
    </template>
</body>

</html>
