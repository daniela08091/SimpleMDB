<!doctype html>
<html lang="en">

<head>
    <meta charset="utf-8" />
    <title>View Actor</title>
    <link rel="stylesheet" href="/styles/main.css" />
    <script type="module" src="/scripts/actors/view.js" defer></script>
</head>

<body>
    <h1>View Actor</h1>

    <div id="status"></div>

    <table>
        <tr>
            <th>ID</th>
            <td id="actor-id"></td>
        </tr>
        <tr>
            <th>Name</th>
            <td id="actor-name"></td>
        </tr>
    </table>
    <h2>Movies</h2>
    <ul id="movies-list"></ul>

    <h3>Add Movie to Actor</h3>
    <form id="actor-movie-form">
        <input type="number" id="movieId" placeholder="Movie ID" required />
        <button class="btn primary">Add</button>
    </form>
    <a id="edit-link">Edit</a>
</body>

</html>
